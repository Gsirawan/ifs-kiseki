name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Vet
        run: CGO_ENABLED=1 go vet ./...

      - name: Test
        run: CGO_ENABLED=1 go test ./... -v

      - name: Build
        run: CGO_ENABLED=1 go build -ldflags "-X main.Version=ci -X main.Commit=$(git rev-parse --short HEAD)" -o ifs-kiseki .
